apiVersion: apps/v1
kind: Deployment
metadata:
  name: customerapi-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: customerapi
  template:
    metadata:
      labels:
        app: customerapi
    spec:
      containers:
        - name: customerapi
          image: ratana2012/customerapi:1.0.0
          ports:
            - containerPort: 8081
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8081"
---
apiVersion: v1
kind: Service
metadata:
  name: customerapi-service
spec:
  type: NodePort
  selector:
    app: customerapi
  ports:
    - port: 8081          # Cluster IP port
      targetPort: 8081    # Pod port
      nodePort: 32008     # External port on node (192.168.0.78:32008)